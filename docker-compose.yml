services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build:
      context: .
      dockerfile: Dockerfile.medusa
      args:
        - REDIS_URL=redis://redis:6379
        - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
        - COOKIE_SECRET
        - JWT_SECRET
        - STORE_CORS
        - ADMIN_CORS
        - AUTH_CORS
        - BACKEND_URL
        - PORT=9000
        - DISABLE_ADMIN=false
        - WORKER_MODE=server
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
      - COOKIE_SECRET
      - JWT_SECRET
      - STORE_CORS
      - ADMIN_CORS
      - AUTH_CORS
      - BACKEND_URL
      - PORT=9000
      - DISABLE_ADMIN=false
      - WORKER_MODE=server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medusa_network

  # Storefront
  # This service runs the Next.js Starter Storefront
  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
      args:
        - REDIS_URL=redis://redis:6379
        - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://medusa:9000
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://medusa:9000
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medusa_network

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge